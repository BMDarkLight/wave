name: Android Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64-v8a, armeabi-v7a]
        include:
          - arch: arm64-v8a
            rust-target: aarch64-linux-android
            tauri-target: aarch64
          - arch: armeabi-v7a
            rust-target: armv7-linux-androideabi
            tauri-target: armv7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Android NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r27c
          cmdline-tools-version: "11076708"

      - name: Set up NDK toolchain
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          
          # Set up toolchain for each architecture
          # Note: Rust target triples map to clang tools as follows:
          # aarch64-linux-android -> aarch64-linux-android34-clang
          # armv7-linux-androideabi -> armv7a-linux-androideabi34-clang
          if [ "${{ matrix.arch }}" = "arm64-v8a" ]; then
            RUST_TARGET="aarch64-linux-android"
            CLANG_TARGET="aarch64-linux-android"
            ANDROID_ABI="arm64-v8a"
          else
            RUST_TARGET="armv7-linux-androideabi"
            CLANG_TARGET="armv7a-linux-androideabi"
            ANDROID_ABI="armeabi-v7a"
          fi
          
          TOOLCHAIN_DIR="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          SYSROOT="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          CC="${TOOLCHAIN_DIR}/${CLANG_TARGET}34-clang"
          CXX="${TOOLCHAIN_DIR}/${CLANG_TARGET}34-clang++"
          AR="${TOOLCHAIN_DIR}/llvm-ar"
          
          echo "CC_${RUST_TARGET//-/_}=${CC}" >> $GITHUB_ENV
          echo "CXX_${RUST_TARGET//-/_}=${CXX}" >> $GITHUB_ENV
          echo "AR_${RUST_TARGET//-/_}=${AR}" >> $GITHUB_ENV
          echo "CARGO_TARGET_${RUST_TARGET//-/_}_LINKER=${CC}" >> $GITHUB_ENV
          
          # Add toolchain to PATH
          echo "${TOOLCHAIN_DIR}" >> $GITHUB_PATH
          
          # Export sysroot for cargo
          echo "ANDROID_SYSROOT=${SYSROOT}" >> $GITHUB_ENV
          echo "SYSROOT=${SYSROOT}" >> $GITHUB_ENV
          
          # Write .cargo/config.toml so cargo picks up the Android NDK linker.
          # Environment variables alone are not propagated through the Gradle
          # build chain invoked by tauri-action, so a config file is required.
          #
          # Use clang++ as the linker so the C++ standard library and ABI
          # symbols (operator new/delete, __cxa_*, std::terminate, etc.)
          # required by oboe_sys are resolved automatically.
          LIB_DIR="${SYSROOT}/usr/lib/${ANDROID_ABI}"
          mkdir -p src-tauri/.cargo
          cat > src-tauri/.cargo/config.toml << EOF
          [target.${RUST_TARGET}]
          linker = "${CXX}"
          rustflags = [
              "-C", "link-arg=-L${LIB_DIR}",
              "-C", "link-arg=-llog",
              "-C", "link-arg=-lOpenSLES",
              "-C", "link-arg=-landroid",
              "-C", "link-arg=-lunwind",
          ]
          EOF

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf \
            xdg-utils \
            libxdo-dev \
            libxdo3 \
            xdotool

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize Tauri Android
        run: npx tauri android init

      # Everything after `tauri android init` is applied here in CI — no external
      # patch scripts. Restores JNI Java, icons, permissions, portrait lock,
      # and ProGuard keep rules for release minify.
      - name: Configure Android project
        run: |
          set -euo pipefail

          APP_DIR="src-tauri/gen/android/app"
          JAVA_SRC="src-tauri/android-src/java"
          JAVA_DEST="$APP_DIR/src/main/java"
          RES_SRC="src-tauri/icons/android"
          RES_DEST="$APP_DIR/src/main/res"
          MANIFEST="$APP_DIR/src/main/AndroidManifest.xml"
          PROGUARD_SRC="src-tauri/android-src/proguard-wave.pro"

          if [[ ! -d "$JAVA_DEST" ]]; then
            echo "::error::Missing $JAVA_DEST — tauri android init failed?"
            exit 1
          fi
          if [[ ! -d "$JAVA_SRC" ]]; then
            echo "::error::Missing $JAVA_SRC"
            exit 1
          fi
          if [[ ! -f "$MANIFEST" ]]; then
            echo "::error::Missing $MANIFEST"
            exit 1
          fi
          if [[ ! -d "$RES_SRC" ]]; then
            echo "::error::Missing $RES_SRC — run \`npx tauri icon assets/app-icon.png\` first"
            exit 1
          fi

          # ── JNI / SAF Java sources ──────────────────────────────────────
          cp -R "$JAVA_SRC"/. "$JAVA_DEST"/
          echo "Synced Android Java sources from $JAVA_SRC"

          # Strip UTF-8 BOMs (javac rejects \ufeff before `package`).
          python3 - <<'PY'
          from pathlib import Path
          root = Path("src-tauri/gen/android/app/src/main/java")
          bom = b"\xef\xbb\xbf"
          for path in root.rglob("*.java"):
              data = path.read_bytes()
              if data.startswith(bom):
                  path.write_bytes(data[len(bom):])
                  print(f"Stripped UTF-8 BOM: {path}")
          PY

          # ── ProGuard keep rules (JNI entry points) ──────────────────────
          if [[ -f "$PROGUARD_SRC" ]]; then
            cp "$PROGUARD_SRC" "$APP_DIR/proguard-wave.pro"
            for candidate in "$APP_DIR/proguard-rules.pro" "$APP_DIR/proguard-rules.txt"; do
              if [[ -f "$candidate" ]] && ! grep -q "proguard-wave.pro" "$candidate"; then
                printf '\n# Wave JNI keep rules\n-include proguard-wave.pro\n' >> "$candidate"
                echo "Hooked Wave keep rules into $candidate"
              fi
            done
          fi

          # ── Launcher icons ──────────────────────────────────────────────
          cp -R "$RES_SRC"/. "$RES_DEST"/
          echo "Applied Wave launcher icons into $RES_DEST"

          # ── Manifest: permissions + portrait lock ───────────────────────
          python3 - "$MANIFEST" <<'PY'
          from pathlib import Path
          import re
          import sys

          path = Path(sys.argv[1])
          text = path.read_text(encoding="utf-8")

          permissions = [
              "android.permission.INTERNET",
              "android.permission.WAKE_LOCK",
              "android.permission.FOREGROUND_SERVICE",
              "android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK",
              "android.permission.MODIFY_AUDIO_SETTINGS",
              "android.permission.POST_NOTIFICATIONS",
              "android.permission.READ_MEDIA_AUDIO",
              "android.permission.READ_EXTERNAL_STORAGE",
          ]

          inserts = []
          for perm in permissions:
              marker = f'android:name="{perm}"'
              if marker in text:
                  continue
              if perm == "android.permission.READ_EXTERNAL_STORAGE":
                  inserts.append(
                      f'    <uses-permission android:name="{perm}" android:maxSdkVersion="32" />'
                  )
              else:
                  inserts.append(f'    <uses-permission android:name="{perm}" />')

          if inserts:
              app_idx = text.find("<application")
              if app_idx == -1:
                  print("::error::could not find <application> in AndroidManifest.xml", file=sys.stderr)
                  sys.exit(1)
              text = text[:app_idx] + "\n".join(inserts) + "\n" + text[app_idx:]
              print(f"Patched {len(inserts)} Android permission(s)")
              for line in inserts:
                  print(f"  + {line.strip()}")
          else:
              print("Android permissions already present")

          orientation = 'android:screenOrientation="portrait"'

          def patch_activity(match: re.Match) -> str:
              tag = match.group(0)
              if "android:screenOrientation=" in tag:
                  return re.sub(
                      r'android:screenOrientation="[^"]*"',
                      orientation,
                      tag,
                      count=1,
                  )
              if tag.endswith("/>"):
                  return tag[:-2].rstrip() + f"\n            {orientation} />"
              if tag.endswith(">"):
                  return tag[:-1].rstrip() + f"\n            {orientation}>"
              return tag

          patched, count = re.subn(
              r"<activity\b[^>]*/?>",
              patch_activity,
              text,
              flags=re.IGNORECASE | re.DOTALL,
          )
          if count == 0:
              print("::error::No <activity> tags found in AndroidManifest.xml", file=sys.stderr)
              sys.exit(1)

          path.write_text(patched, encoding="utf-8")
          print(f"Locked {count} activity(ies) to portrait")
          PY

          # ── Media3 / ExoPlayer deps for WaveExoPlayer ────────────────────
          python3 - <<'PY'
          from pathlib import Path
          import re

          candidates = list(Path("src-tauri/gen/android").rglob("build.gradle.kts"))
          app_gradle = None
          for path in candidates:
              text = path.read_text(encoding="utf-8")
              if "dependencies" in text and ("tauri" in text.lower() or path.parts[-2] == "app"):
                  # Prefer the app module gradle
                  if path.parent.name == "app" or "namespace" in text:
                      app_gradle = path
                      break
                  if app_gradle is None:
                      app_gradle = path

          if app_gradle is None:
              # Fall back: app/build.gradle.kts
              fallback = Path("src-tauri/gen/android/app/build.gradle.kts")
              if fallback.is_file():
                  app_gradle = fallback

          if app_gradle is None:
              raise SystemExit("::error::Could not find Android app build.gradle.kts")

          text = app_gradle.read_text(encoding="utf-8")
          deps = [
              'implementation("androidx.media3:media3-exoplayer:1.5.1")',
              'implementation("androidx.media3:media3-common:1.5.1")',
          ]
          missing = [d for d in deps if d not in text]
          if not missing:
              print(f"Media3 deps already present in {app_gradle}")
          else:
              # Insert before the closing of the dependencies block
              m = re.search(r"dependencies\s*\{", text)
              if not m:
                  raise SystemExit(f"::error::No dependencies {{}} in {app_gradle}")
              # Find matching closing brace for dependencies
              start = m.end()
              depth = 1
              i = start
              while i < len(text) and depth:
                  if text[i] == "{":
                      depth += 1
                  elif text[i] == "}":
                      depth -= 1
                  i += 1
              insert_at = i - 1
              injection = "\n    // Wave ExoPlayer (content:// playback)\n"
              injection += "\n".join(f"    {d}" for d in missing) + "\n"
              text = text[:insert_at] + injection + text[insert_at:]
              app_gradle.write_text(text, encoding="utf-8")
              print(f"Patched Media3 deps into {app_gradle}")
              for d in missing:
                  print(f"  + {d}")
          PY

      # Signs release APKs via keystore.properties + Gradle signingConfigs.
      # Secrets: ANDROID_KEY_BASE64, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
      # Optional: ANDROID_STORE_PASSWORD (defaults to ANDROID_KEY_PASSWORD)
      - name: Setup Android signing
        id: signing
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "${ANDROID_KEY_BASE64}" ] || [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "Skipping Android signing (signing secrets not available for this PR)."
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Missing Android signing secrets. Set ANDROID_KEY_BASE64, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD."
            exit 1
          fi
          bash ./scripts/setup-android-signing.sh
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Build Tauri Android App
        run: npx tauri android build --target ${{ matrix.tauri-target }}

      - name: Verify APK signatures
        if: steps.signing.outputs.enabled == 'true'
        run: |
          shopt -s globstar nullglob
          apks=(src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "::error::No release APKs found to verify"
            exit 1
          fi

          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)"
          APKSIGNER="${BUILD_TOOLS}/apksigner"
          if [ ! -x "$APKSIGNER" ]; then
            echo "::error::apksigner not found under $ANDROID_HOME/build-tools"
            exit 1
          fi

          for apk in "${apks[@]}"; do
            echo "Verifying $apk"
            # Unsigned release APKs fail this check.
            "$APKSIGNER" verify --print-certs "$apk"
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wave-android-${{ matrix.arch }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
          if-no-files-found: error

  release:
    name: Create Release
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}