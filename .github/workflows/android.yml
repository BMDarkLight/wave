name: Android Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64-v8a, armeabi-v7a]
        include:
          - arch: arm64-v8a
            rust-target: aarch64-linux-android
            tauri-target: aarch64
          - arch: armeabi-v7a
            rust-target: armv7-linux-androideabi
            tauri-target: armv7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Android NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r27c
          cmdline-tools-version: "11076708"

      - name: Set up NDK toolchain
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          
          # Set up toolchain for each architecture
          # Note: Rust target triples map to clang tools as follows:
          # aarch64-linux-android -> aarch64-linux-android34-clang
          # armv7-linux-androideabi -> armv7a-linux-androideabi34-clang
          if [ "${{ matrix.arch }}" = "arm64-v8a" ]; then
            RUST_TARGET="aarch64-linux-android"
            CLANG_TARGET="aarch64-linux-android"
            ANDROID_ABI="arm64-v8a"
          else
            RUST_TARGET="armv7-linux-androideabi"
            CLANG_TARGET="armv7a-linux-androideabi"
            ANDROID_ABI="armeabi-v7a"
          fi
          
          TOOLCHAIN_DIR="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          SYSROOT="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          CC="${TOOLCHAIN_DIR}/${CLANG_TARGET}34-clang"
          CXX="${TOOLCHAIN_DIR}/${CLANG_TARGET}34-clang++"
          AR="${TOOLCHAIN_DIR}/llvm-ar"
          
          echo "CC_${RUST_TARGET//-/_}=${CC}" >> $GITHUB_ENV
          echo "CXX_${RUST_TARGET//-/_}=${CXX}" >> $GITHUB_ENV
          echo "AR_${RUST_TARGET//-/_}=${AR}" >> $GITHUB_ENV
          echo "CARGO_TARGET_${RUST_TARGET//-/_}_LINKER=${CC}" >> $GITHUB_ENV
          
          # Add toolchain to PATH
          echo "${TOOLCHAIN_DIR}" >> $GITHUB_PATH
          
          # Export sysroot for cargo
          echo "ANDROID_SYSROOT=${SYSROOT}" >> $GITHUB_ENV
          echo "SYSROOT=${SYSROOT}" >> $GITHUB_ENV
          
          # Write .cargo/config.toml so cargo picks up the Android NDK linker.
          # Environment variables alone are not propagated through the Gradle
          # build chain invoked by tauri-action, so a config file is required.
          #
          # Use clang++ as the linker so the C++ standard library and ABI
          # symbols (operator new/delete, __cxa_*, std::terminate, etc.)
          # required by oboe_sys are resolved automatically.
          LIB_DIR="${SYSROOT}/usr/lib/${ANDROID_ABI}"
          mkdir -p src-tauri/.cargo
          cat > src-tauri/.cargo/config.toml << EOF
          [target.${RUST_TARGET}]
          linker = "${CXX}"
          rustflags = [
              "-C", "link-arg=-L${LIB_DIR}",
              "-C", "link-arg=-llog",
              "-C", "link-arg=-lOpenSLES",
              "-C", "link-arg=-landroid",
              "-C", "link-arg=-lunwind",
          ]
          EOF

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf \
            xdg-utils \
            libxdo-dev \
            libxdo3 \
            xdotool

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize Tauri Android
        run: npx tauri android init

      # Signs release APKs via keystore.properties + Gradle signingConfigs.
      # Secrets: ANDROID_KEY_BASE64, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
      # Optional: ANDROID_STORE_PASSWORD (defaults to ANDROID_KEY_PASSWORD)
      - name: Setup Android signing
        id: signing
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "${ANDROID_KEY_BASE64}" ] || [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "Skipping Android signing (signing secrets not available for this PR)."
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Missing Android signing secrets. Set ANDROID_KEY_BASE64, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD."
            exit 1
          fi
          bash ./scripts/setup-android-signing.sh
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Build Tauri Android App
        run: npx tauri android build --target ${{ matrix.tauri-target }}

      - name: Verify APK signatures
        if: steps.signing.outputs.enabled == 'true'
        run: |
          shopt -s globstar nullglob
          apks=(src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "::error::No release APKs found to verify"
            exit 1
          fi

          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)"
          APKSIGNER="${BUILD_TOOLS}/apksigner"
          if [ ! -x "$APKSIGNER" ]; then
            echo "::error::apksigner not found under $ANDROID_HOME/build-tools"
            exit 1
          fi

          for apk in "${apks[@]}"; do
            echo "Verifying $apk"
            # Unsigned release APKs fail this check.
            "$APKSIGNER" verify --print-certs "$apk"
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wave-android-${{ matrix.arch }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
          if-no-files-found: error

  release:
    name: Create Release
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}