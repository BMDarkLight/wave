name: Android Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64-v8a, armeabi-v7a]
        include:
          - arch: arm64-v8a
            rust-target: aarch64-linux-android
          - arch: armeabi-v7a
            rust-target: armv7-linux-androideabi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Android NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r27c
          cmdline-tools-version: "11076708"

      - name: Set up NDK toolchain
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          
          # Set up toolchain for each architecture
          if [ "${{ matrix.arch }}" = "arm64-v8a" ]; then
            TARGET="aarch64-linux-android"
            CC="aarch64-linux-android34-clang"
            CXX="aarch64-linux-android34-clang++"
            CARGO_TARGET="aarch64_linux_android"
          else
            TARGET="armv7-linux-androideabi"
            CC="armv7a-linux-androideabi34-clang"
            CXX="armv7a-linux-androideabi34-clang++"
            CARGO_TARGET="armv7_linux_androideabi"
          fi
          
          TOOLCHAIN_DIR="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CC_${CARGO_TARGET}=${TOOLCHAIN_DIR}/${CC}" >> $GITHUB_ENV
          echo "CXX_${CARGO_TARGET}=${TOOLCHAIN_DIR}/${CXX}" >> $GITHUB_ENV
          echo "AR_${CARGO_TARGET}=${TOOLCHAIN_DIR}/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_${CARGO_TARGET}_LINKER=${TOOLCHAIN_DIR}/${CC}" >> $GITHUB_ENV

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf \
            xdg-utils \
            libxdo-dev \
            libxdo3 \
            xdotool

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri Android App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        with:
          target: ${{ matrix.arch }}
          args: --target ${{ matrix.rust-target }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wave-android-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.rust-target }}/release/bundle/apk/*.apk
          if-no-files-found: error

      - name: Upload AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wave-android-aab-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.rust-target }}/release/bundle/aab/*.aab
          if-no-files-found: error

  release:
    name: Create Release
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}