name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ./src-tauri -> target

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          libasound2-dev \
          patchelf \
          xdg-utils \
          libxdo-dev \
          libxdo3 \
          xdotool

    - name: Configure Linux native library path
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        XDO_LIBRARY="$(ldconfig -p | awk '/libxdo\.so\.3/{print $NF; exit}')"
        if [ -z "$XDO_LIBRARY" ] || [ ! -f "$XDO_LIBRARY" ]; then
          echo "::error::libxdo.so.3 was not installed"
          exit 1
        fi
        mkdir -p "$GITHUB_WORKSPACE/.ci-native-libs"
        ln -sf "$XDO_LIBRARY" "$GITHUB_WORKSPACE/.ci-native-libs/libxdo.so"
        echo "LIBRARY_PATH=$GITHUB_WORKSPACE/.ci-native-libs:${LIBRARY_PATH:-}" >> "$GITHUB_ENV"
        echo "RUSTFLAGS=-Lnative=$GITHUB_WORKSPACE/.ci-native-libs ${RUSTFLAGS:-}" >> "$GITHUB_ENV"

    - name: Install npm dependencies
      run: npm ci

    - name: Build the app
      uses: tauri-apps/tauri-action@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wave-${{ matrix.os }}
        path: src-tauri/target/release/bundle/
        if-no-files-found: error
